name: StandupBuddy
options:
  bundleIdPrefix: house.gourley
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.5"
  createIntermediateGroups: true
  defaultConfig: Debug

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.3"

targets:
  StandupBuddy:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: house.gourley.StandupBuddy
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: StandupBuddy.entitlements
        INFOPLIST_FILE: Sources/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: GRDB

  StandupBuddyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: house.gourley.StandupBuddyTests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: StandupBuddy
      - package: GRDB
